<!DOCTYPE html>
<html>
<head>
    <title>Student Analyzer</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #1f4037, #99f2c8);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 25px;
        }

        input[type="file"] {
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #1f4037;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: #16312b;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>📊 Student Analyzer</h1>

        <form action="/analyze" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <br>
            <button type="submit" class="btn">Analyze</button>
        </form>
    </div>
</body>
</html>
